version: "3.9"

services:
  db:
    image: postgres:15
    container_name: parts_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parts_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["/app/entrypoint.sh"]
    volumes:
      - ./backend:/app

  tests:
    build: ./backend
    container_name: parts_tests
    command: pytest
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    container_name: parts_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  pg_data: